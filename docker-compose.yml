# Stack za Portainer (Stacks -> Add stack -> Repository).
# Compose path: docker-compose.yml (default).
#
# Deploya SAMO aplikaciju - baza vec postoji i nije dio ovog stacka.
#
# Environment varijable koje se postavljaju u Portaineru:
#   CONNECTION_STRING      - puni connection string prema postojecoj bazi.
#                            Default cilja SQL Server na hostu (host.docker.internal,1433).
#                            Ako baza vrti u drugom containeru, koristi npr.
#                            Server=<ime-containera-ili-IP>,1433;Database=CasinoDB;User Id=sa;Password=...;TrustServerCertificate=True;
#   MSSQL_SA_PASSWORD      - SA lozinka, koristi se samo u default connection stringu (default: CasinoPass123!)
#   GOOGLE_CLIENT_ID       - Google OAuth client id (bez toga je Google login iskljucen)
#   GOOGLE_CLIENT_SECRET   - Google OAuth client secret
#   ADMIN_EMAIL            - email/username seedanog admin racuna (default: admin@casino.local)
#   ADMIN_PASSWORD         - lozinka seedanog admin racuna (default: Admin123$)
#   DEEPSEEK_API_KEY       - API kljuc za DeepSeek AI chat (bez njega je chat iskljucen);
#                            moze stajati i u .env datoteci uz docker-compose.yml
#   DEEPSEEK_MODEL         - DeepSeek model (default: deepseek-chat)
#   Smtp__From             - adresa s koje se salju mailovi (bez nje je slanje maila iskljuceno)
#   Smtp__User             - SMTP korisnik (Gmail adresa)
#   Smtp__Password         - SMTP lozinka (Gmail app password)
#   HTTP_BIND              - host bind za app (default: 127.0.0.1:5209, za nginx na istom hostu)

services:
  web:
    build:
      context: .
      dockerfile: aspnet/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=${CONNECTION_STRING:-Server=host.docker.internal,1433;Database=CasinoDB;User Id=sa;Password=${MSSQL_SA_PASSWORD:-CasinoPass123!};TrustServerCertificate=True;}
      - Authentication__Google__ClientId=${GOOGLE_CLIENT_ID:-}
      - Authentication__Google__ClientSecret=${GOOGLE_CLIENT_SECRET:-}
      - SeedAdmin__Email=${ADMIN_EMAIL:-admin@casino.local}
      - SeedAdmin__Password=${ADMIN_PASSWORD:-Admin123$$}
      - DeepSeek__ApiKey=${DEEPSEEK_API_KEY:-}
      - DeepSeek__Model=${DEEPSEEK_MODEL:-deepseek-chat}
      - Smtp__From=${Smtp__From:-}
      - Smtp__User=${Smtp__User:-}
      - Smtp__Password=${Smtp__Password:-}
    ports:
      - "${HTTP_BIND:-127.0.0.1:5209}:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - uploads:/app/wwwroot/uploads
    restart: unless-stopped

volumes:
  uploads:
