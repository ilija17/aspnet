# Stack za Portainer (Stacks -> Add stack -> Repository).
# Compose path: docker-compose.yml (default).
#
# Deploya SAMO aplikaciju - baza vec postoji i nije dio ovog stacka.
#
# Environment varijable koje se postavljaju u Portaineru:
#   CONNECTION_STRING      - puni connection string prema postojecoj bazi.
#                            Default cilja SQL Server na hostu (host.docker.internal,1433).
#                            Ako baza vrti u drugom containeru, koristi npr.
#                            Server=<ime-containera-ili-IP>,1433;Database=CasinoDB;User Id=sa;Password=...;TrustServerCertificate=True;
#   MSSQL_SA_PASSWORD      - SA lozinka, koristi se samo u default connection stringu (default: CasinoPass123!)
#   GOOGLE_CLIENT_ID       - Google OAuth client id (bez toga je Google login iskljucen)
#   GOOGLE_CLIENT_SECRET   - Google OAuth client secret
#   HTTP_BIND              - host bind za app (default: 127.0.0.1:5209, za nginx na istom hostu)

services:
  web:
    build:
      context: .
      dockerfile: aspnet/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=${CONNECTION_STRING:-Server=host.docker.internal,1433;Database=CasinoDB;User Id=sa;Password=${MSSQL_SA_PASSWORD:-CasinoPass123!};TrustServerCertificate=True;}
      - Authentication__Google__ClientId=${GOOGLE_CLIENT_ID:-}
      - Authentication__Google__ClientSecret=${GOOGLE_CLIENT_SECRET:-}
    ports:
      - "${HTTP_BIND:-127.0.0.1:5209}:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - uploads:/app/wwwroot/uploads
    restart: unless-stopped

volumes:
  uploads:
