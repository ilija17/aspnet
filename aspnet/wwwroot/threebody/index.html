<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three Body Problem</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="top-bar">
        <h1>Three Body Problem</h1>
        <div class="player-info" aria-live="polite">
          <span id="player-name" class="player-name">—</span>
          <span id="balance" class="balance">Balance: —</span>
        </div>
        <div class="scoreboard" aria-live="polite">
          <span id="wins">Wins: 0</span>
          <span id="losses">Losses: 0</span>
        </div>
      </section>

      <section id="gate" class="gate-panel hidden" aria-live="polite">
        <p id="gate-message"></p>
        <a id="gate-link" class="btn btn-primary" href="#"></a>
      </section>

      <section id="table" class="table" aria-label="Three body simulation table">
        <div class="table-rail"></div>
        <div class="table-inner">
          <div class="warning-strip" aria-hidden="true">Three Body Problem // Gravitational Chaos // Bet Wisely</div>
          <div class="hud-grid" aria-hidden="true"></div>
          <div id="vfx-layer" aria-hidden="true"></div>

          <section class="sim-panel" aria-label="Gravitational simulation">
            <canvas id="sim-canvas"></canvas>
            <div id="sim-overlay" class="sim-overlay hidden" aria-live="polite"></div>
          </section>

          <section class="planet-grid" role="group" aria-label="Pick a planet">
            <button class="planet-card" data-planet="A" type="button" style="--planet-color: #ff6b6b">
              <span class="planet-dot" aria-hidden="true"></span>
              <span class="planet-name">Planet A</span>
              <span class="planet-stats">Mass 400 · Radius 32</span>
              <span class="planet-state active">Active</span>
            </button>
            <button class="planet-card" data-planet="B" type="button" style="--planet-color: #4ecdc4">
              <span class="planet-dot" aria-hidden="true"></span>
              <span class="planet-name">Planet B</span>
              <span class="planet-stats">Mass 250 · Radius 24</span>
              <span class="planet-state active">Active</span>
            </button>
            <button class="planet-card" data-planet="C" type="button" style="--planet-color: #ffe66d">
              <span class="planet-dot" aria-hidden="true"></span>
              <span class="planet-name">Planet C</span>
              <span class="planet-stats">Mass 150 · Radius 28</span>
              <span class="planet-state active">Active</span>
            </button>
          </section>

          <section class="bankroll-panel">
            <p id="bet-display" class="bet">Your Bet: —</p>
            <div class="chips" role="group" aria-label="Bet chips">
              <button class="chip" data-bet="25">$25</button>
              <button class="chip" data-bet="50">$50</button>
              <button class="chip" data-bet="100">$100</button>
              <button class="chip" data-bet="200">$200</button>
            </div>
          </section>

          <article class="status-panel">
            <p id="status">Connecting…</p>
            <p id="round-result" class="round-result hidden" aria-live="polite"></p>
          </article>

          <section class="actions">
            <button id="start-btn" class="btn btn-primary">Start Simulation</button>
            <button id="skip-btn" class="btn hidden">Skip to End</button>
            <button id="again-btn" class="btn btn-accent hidden">Play Again</button>
          </section>
        </div>
      </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.2/anime.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
