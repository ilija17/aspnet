<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blackjack</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="top-bar">
        <h1>Blackjack</h1>
        <div class="player-info" aria-live="polite">
          <span id="player-name" class="player-name">—</span>
          <span id="balance" class="balance">Balance: —</span>
        </div>
        <div class="scoreboard" aria-live="polite">
          <span id="wins">Wins: 0</span>
          <span id="losses">Losses: 0</span>
          <span id="pushes">Pushes: 0</span>
        </div>
      </section>

      <section id="gate" class="gate-panel hidden" aria-live="polite">
        <p id="gate-message"></p>
        <a id="gate-link" class="btn btn-primary" href="#"></a>
      </section>

      <section id="table" class="table" aria-label="Blackjack table">
        <div class="table-rail"></div>
        <div class="table-inner">
          <div class="warning-strip" aria-hidden="true">Blackjack // House Rules Apply // Good Luck</div>
          <div class="hud-grid" aria-hidden="true"></div>
          <div id="vfx-layer" aria-hidden="true"></div>

          <section class="bankroll-panel">
            <p id="bet-display" class="bet">Your Bet: —</p>
            <div class="chips" role="group" aria-label="Bet chips">
              <button class="chip" data-bet="25">$25</button>
              <button class="chip" data-bet="50">$50</button>
              <button class="chip" data-bet="100">$100</button>
              <button class="chip" data-bet="200">$200</button>
            </div>
          </section>

          <article class="hand-area dealer-area">
            <header>
              <h2>Dealer</h2>
              <p id="dealer-total" class="total">Total: ?</p>
            </header>
            <div id="dealer-cards" class="cards"></div>
          </article>

          <article class="status-panel">
            <p id="status">Connecting…</p>
            <p id="round-result" class="round-result hidden" aria-live="polite"></p>
          </article>

          <article class="hand-area player-area">
            <header>
              <h2 id="player-label">Player</h2>
              <p id="player-total" class="total">Total: 0</p>
            </header>
            <div id="player-cards" class="cards"></div>
          </article>

          <section class="actions">
            <button id="deal-btn" class="btn btn-primary">Deal</button>
            <button id="hit-btn" class="btn">Hit</button>
            <button id="stand-btn" class="btn">Stand</button>
            <button id="double-btn" class="btn btn-accent">Double Down</button>
          </section>
        </div>
      </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.2/anime.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
